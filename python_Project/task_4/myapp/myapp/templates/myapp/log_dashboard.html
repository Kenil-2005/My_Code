<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Request Log Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            border: 1px solid #ddd;
            padding: 15px 20px;
            border-radius: 8px;
            min-width: 150px;
        }
        .card-title {
            font-size: 14px;
            color: #555;
        }
        .card-value {
            font-size: 24px;
            font-weight: bold;
        }
        .charts {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
        }
        canvas {
            max-width: 400px;
        }
    </style>
</head>
<body>
    <h1>Request Log Dashboard</h1>

    <div class="cards">
        <div class="card">
            <div class="card-title">Successful Responses</div>
            <div class="card-value">{{ success_count }}</div>
        </div>
        <div class="card">
            <div class="card-title">Error Responses</div>
            <div class="card-value">{{ error_count }}</div>
        </div>
    </div>

    <div class="charts">
        <!-- Pie chart: success vs error -->
        <div>
            <h3>Success vs Error</h3>
            <canvas id="successErrorChart"></canvas>
        </div>

        <!-- Bar chart: status code ranges -->
        <div>
            <h3>Status Code Distribution</h3>
            <canvas id="statusRangeChart"></canvas>
        </div>
    </div>

    <script>
    // Data from Django context, passed as strings then converted in JS
    const successCount = Number('{{ success_count }}');
    const errorCount = Number('{{ error_count }}');
    const statusLabels = JSON.parse('{{ status_labels|safe|escapejs }}');
    const statusValues = JSON.parse('{{ status_values|safe|escapejs }}');

    // Pie chart for success vs error
    const ctxPie = document.getElementById('successErrorChart').getContext('2d');
    new Chart(ctxPie, {
        type: 'pie',
        data: {
            labels: ['Success', 'Error'],
            datasets: [{
                data: [successCount, errorCount],
            }]
        },
    });

    // Bar chart for status code ranges
    const ctxBar = document.getElementById('statusRangeChart').getContext('2d');
    new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: statusLabels,
            datasets: [{
                label: 'Number of responses',
                data: statusValues,
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        precision: 0
                    }
                }
            }
        }
    });
</script>

</body>
</html>
