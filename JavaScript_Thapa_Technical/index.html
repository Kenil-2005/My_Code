<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo list</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            margin: 150px;
            text-align: center;
        }

        .inputSection {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-size: 25px;
        }

        #input {
            padding: 5px 7px;
        }

        #btn {
            padding: 5px 7px;
            margin-inline: 20px;
        }

        .displaySection {
            width: 80%;
            display: flex;
            align-items: center;
            justify-content: start;
            margin-inline: 50px;
        }

        .list {
            margin: 7px;
        }

        .displaySection {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Simple DOM ToDo list</h1>
        <div class="inputSection">
            <input id="input" type="text" placeholder="Enter ToDo">
            <button type="button" id="btn">click me</button>
        </div>
        <hr>
        <div class="displaySection"></div>
    </div>

</body>
<script>
    let btn = document.querySelector("#btn");
    let displaySection = document.querySelector(".displaySection");
    let input = document.getElementById("input");
    // console.log(displaySection.innerHTML);
    console.log(input);
    let JSONarray = [];

    // const readInput = () => {
    //     let input = document.getElementById("input").value;
    //     console.log(input);
    // }

    const updateList = () => {
        let p = document.createElement("p");
        p.textContent = input.value;
        displaySection.append(p);
        input.value = "";
    }

    btn.addEventListener('click', () => {
        updateList();
    });

    displaySection.addEventListener('click', (e) => {
        displaySection.removeChild(e.target);
    })

</script>

</html>
