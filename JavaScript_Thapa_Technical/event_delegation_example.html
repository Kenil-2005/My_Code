<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event DelegationExample</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: white;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #1B1B1D;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h2 {
            padding-bottom: 30px;
        }

        #btn-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .btn {
            background-color: #1B1B1D;
            outline: none;
            border: 2px solid white;
            padding: 15px;
            margin: 5px;
            width: 100px;
        }

        .btn:hover {
            background-color: white;
            color: black;
        }

        p {
            text-align: center;
            color: #CBC97B;
            padding: 25px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Which programming language you like the most?</h2>
        <div id="btn-section">
            <Button class="btn">JavaScript</Button>
            <Button class="btn">C/C++</Button>
            <Button class="btn">Python</Button>
            <Button class="btn">HTML/CSS</Button>
        </div>
        <p></p>
    </div>

    <script>

        const favLang = () => {
            const targetValue = event.target.innerText;

            const text = `Your fav Programming language is : ${targetValue}`;
            // console.log(targetValue);
            document.querySelector("p").innerHTML = text;
        }

        const btn = document.getElementById("btn-section").addEventListener('click',favLang);
    </script>

</body>


</html>
