<!-- ***event Propagation : How event work in javaScript 
 There is two way of event propagation i) Bubble phase ii) Capturing phase -->
<!-- i) Bubble Phase 
 *the event propagation flow is Target to DOM (Bottom to Top).
 *if target's parent element have event,and we press the target then the parent event also execute 
 *It is default and we can stop this by event.stopPropagation()-->

<!-- ii) Capturing phase 
 *the event propogation flow is DOM to Target (Top to Bottom) 
 *if target element children have event, and we press the target then the children event also execute
 *we have to add one boolen parameter when we call addEventListner(event,function,true/false).
 true : for capturing phase
 flase : for bubble phase -->
