<!DOCTYPE html>

            height: 100vh;

    <script>

        const fecthData = () => {
            const respose = fetch(apiUrl2, {
                headers: {  // it use to accept the webpage as json file
                    Accept: "application/json",
                }
            }).then((res) => {
                console.log(res);
                return res.json();
            }).then((data) => {
                // console.log(data);
