<div class="border rounded p-3 mb-3 d-flex justify-content-between align-items-center shadow">
    <div class="todo-left-section">
        <h5 [ngClass]="{'strike': !todo.active}">{{todo.title}}</h5>
        <p class="my-0 ps-3">{{todo.desc}}</p>
    </div>
    <div class="todo-right-section">
        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="{{i}}" [checked]="!todo.active"
                (click)="OnChecked(todo)">
            <label class="form-check-label" for="{{i}}">Done</label>
        </div>
        <div class="delete-btn">
            <div class="btn btn-danger shadow" (click)="Deactive(todo)">Delete</div>
        </div>
    </div>
</div>
