<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="left-section">
            <div class="text">Standard Calculator</div>
            <div class="screen-section">
                <input id="screen" type="text">
            </div>
            <div class="number-section">
                <div class="number">
                    <button class="btn btn-sign">%</button>
                    <button class="btn btn-sign">^</button>
                    <button class="btn btn-clear-all">Clear All</button>
                    <button class="btn btn-clear">CE</button>
                    <button class="btn btn-sign">⅟x</button>
                    <button class="btn btn-sign">x²</button>
                    <button class="btn btn-sign">²√x</button>
                    <button class="btn btn-sign">/</button>
                    <button class="btn btn-num">1</button>
                    <button class="btn btn-num">2</button>
                    <button class="btn btn-num">3</button>
                    <button class="btn btn-sign">*</button>
                    <button class="btn btn-num">4</button>
                    <button class="btn btn-num">5</button>
                    <button class="btn btn-num">6</button>
                    <button class="btn btn-sign">-</button>
                    <button class="btn btn-num">7</button>
                    <button class="btn btn-num">8</button>
                    <button class="btn btn-num">9</button>
                    <button class="btn btn-sign">+</button>
                    <button class="btn btn-sign">.</button>
                    <button class="btn btn-num">0</button>
                    <button class="btn btn-equal-to btn-grid">=</button>
                </div>
            </div>
        </div>
        <div class="right-section">
            <div class="right-sec1">
                <div class="right-text">
                    History
                </div>
                <div class="right-button">
                    <button class="history-clear">Clear History</button>
                </div>
            </div>
            <div class="right-sec2">
                <table id="tableBody">
                    <tr>
                        <td></td>
                    </tr>
                    <tr>
                        <td></td>
                    </tr>
                </table>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
