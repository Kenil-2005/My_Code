<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation in JavaScript</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="container">
        <div class="box">

            <div class="headerSection">
                <h1>Sign Up</h1>
            </div>

            <div class="bodySection">
                <div class="nameSection">
                    <div id="label">Full Name</div>
                    <input type="text" id="name" placeholder="Type Name Here">
                </div>

                <div class="emailSection">
                    <div id="label">Email</div>
                    <input type="email" id="email" placeholder="xyz@gmail.com">
                </div>

                <div class="passwordSection">
                    <div for="label">Password</div>
                    <input type="password" id="password" placeholder="at least 8 characters">

                    <div for="label">Confirm Password</div>
                    <input type="password" id="confirmPassword" placeholder="rewrite password">
                </div>
            </div>

            <div class="btnSection">
                <button id="btn">Login</button>
            </div>

            <div class="footSection">
                <p>
                    Already have an account?
                    <a href="../Login_Page/index.html">Login</a>
                </p>
            </div>
        </div>
    </div>
</body>

<script src="script.js"></script>

</html>
